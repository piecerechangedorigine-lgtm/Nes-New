name: CI

# Runs on every push to main and every pull request targeting it — this
# is also what satisfies 11.5.7's "Pull Request Checks" requirement;
# a PR gets the exact same build/test/lint/detekt gate a direct push
# would, not a lighter separate check that could pass while the real
# gate would have failed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same PR cancels the in-flight run for the old
# one — no point spending CI minutes validating a commit that's
# already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test, Lint, Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # gradle/actions/setup-gradle wraps the committed ./gradlew — its
      # normal, documented mode — providing build-scan-free dependency
      # and Gradle Home caching without needing gradle-version pinned
      # here, since the wrapper properties file already pins it.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Compile errors fail here, before any test or lint step runs —
      # no point running a test suite against code that doesn't build.
      - name: Compile (debug)
        run: ./gradlew assembleDebug --stacktrace

      # Every module's JVM unit tests — this is the 175+ test suite
      # documented in PROJECT_STATUS.md. A single failing test fails
      # this step and the whole workflow.
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/test-results/testDebugUnitTest/*.xml"
          retention-days: 14

      # Android Lint — built into AGP, no extra plugin needed. A real
      # lint finding at error severity fails the build.
      - name: Lint (debug)
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: "**/build/reports/lint-results-debug.html"
          retention-days: 14

      # Detekt — static analysis across every module in one pass (see
      # the root build.gradle.kts subprojects block). Config lives at
      # config/detekt/detekt.yml, tuned to this codebase's real
      # conventions rather than raw defaults — see that file's own
      # header for what's overridden and why.
      - name: Detekt
        run: ./gradlew detekt --stacktrace

      - name: Upload detekt results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-results
          path: "**/build/reports/detekt/detekt.html"
          retention-days: 14
