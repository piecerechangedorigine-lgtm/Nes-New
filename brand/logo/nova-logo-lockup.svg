<?xml version="1.0" encoding="UTF-8"?>
<!--
  Nova horizontal lockup — mark + wordmark, for contexts wider than a
  square (splash art at rest, settings "About" screen, marketing pages).
  Never scale the mark and wordmark independently of each other; the
  clearspace between them (18 units, half the mark's own margin) is fixed.
-->
<svg width="280" height="108" viewBox="0 0 280 108" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30,28 L30,80 L78,28 L78,80" transform="translate(-4,-4)" stroke="#5B6CFF" stroke-width="14" />
    <path d="M30,28 L30,80 L78,28 L78,80" transform="translate(108,0) scale(-1,1) translate(6,6)" stroke="#9FE8D6" stroke-width="14" stroke-opacity="0.78" />
  </g>
  <text
    x="120"
    y="66"
    font-family="'SF Pro Display','Segoe UI',system-ui,sans-serif"
    font-size="40"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#F5F5F7"
  >Nova</text>
</svg>
